<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>画像撮影</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      text-align: center;
      padding: 2em;
      font-family: sans-serif;
    }
    video, canvas {
      width: 100%;
      max-width: 300px;
      border: 1px solid #ccc;
      margin-bottom: 1em;
    }
    button {
      font-size: 1em;
      padding: 0.6em 1.2em;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    #captureBtn {
      background-color: #2196F3;
      color: white;
    }
    #nextBtn {
      background-color: #4CAF50;
      color: white;
      display: none;
      margin-top: 1em;
    }
    #warning {
      color: red;
      font-weight: bold;
      margin-top: 0.5em;
    }
    #savedImage {
      margin-top: 1em;
    }
  </style>
</head>
<body>
  <h2>画像を撮影してください</h2>
  <video id="video" autoplay></video>
  <br>
  <button id="captureBtn" onclick="capture()">撮影する</button>
  <p id="warning">＊画像を保存してください</p>

  <canvas id="canvas" style="display:none;"></canvas>
  <div id="savedImage"></div>

  <button id="nextBtn" onclick="goNext()">次へ進む</button>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const savedImage = document.getElementById("savedImage");
    const nextBtn = document.getElementById("nextBtn");

    // カメラ起動
    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => {
        video.srcObject = stream;
      })
      .catch(err => {
        alert("カメラにアクセスできません：" + err);
      });

    function capture() {
      const keyword = sessionStorage.getItem("keyword") || "（未取得）";

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const imgData = canvas.toDataURL("image/png");

      savedImage.innerHTML = `
        <p>保存された画像：</p>
        <img src="${imgData}" width="300"><br>
        <p>答え：${keyword}</p>
      `;

      nextBtn.style.display = "inline-block";
    }

    function goNext() {
      location.href = "confirm.html"; // 遷移先は適宜変更
    }
  </script>
</body>
</html>
