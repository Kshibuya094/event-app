<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>画像撮影</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      text-align: center;
      padding: 2em;
      font-family: sans-serif;
    }
    video, canvas {
      width: 100%;
      max-width: 300px;
      border: 1px solid #ccc;
      margin-bottom: 1em;
    }
    button {
      font-size: 1em;
      padding: 0.6em 1.2em;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    #captureBtn {
      background-color: #2196F3;
      color: white;
    }
    #saveBtn {
      background-color: #4CAF50;
      color: white;
      display: none;
      margin-top: 1em;
    }
    #warning {
      color: red;
      font-weight: bold;
      display: none;
      margin-top: 0.5em;
    }
    #savedImage {
      margin-top: 1em;
    }
  </style>
</head>
<body>
  <h2>画像を撮影してください</h2>
  <video id="video" autoplay></video>
  <br>
  <button id="captureBtn" onclick="capture()">撮影する</button>
  <p id="warning">＊画像を保存してください</p>
  <button id="saveBtn" onclick="saveImage()">保存する</button>

  <canvas id="canvas" style="display:none;"></canvas>
  <div id="savedImage"></div>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const savedImage = document.getElementById("savedImage");
    const warning = document.getElementById("warning");
    const saveBtn = document.getElementById("saveBtn");

    // カメラ起動
    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => {
        video.srcObject = stream;
      })
      .catch(err => {
        alert("カメラにアクセスできません：" + err);
      });

    function capture() {
      const keyword = sessionStorage.getItem("keyword") || "（未取得）";
      const serial = generateSerial();

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const imgData = canvas.toDataURL("image/png");

      savedImage.innerHTML = `
        <p>保存された画像：</p>
        <img src="${imgData}" width="300"><br>
        <p>整理番号：${serial}</p>
        <p>答え：${keyword}</p>
      `;

      warning.style.display = "block";
      saveBtn.style.display = "inline-block";
    }

    function saveImage() {
      // 保存処理は現場仕様に応じて実装（ここでは次ページ遷移）
      location.href = "confirm.html";
    }

    function generateSerial() {
      // 整理番号生成（例：日時＋ランダム）
      const now = new Date();
      const ymd = now.toISOString().slice(0,10).replace(/-/g,"");
      const rand = Math.floor(Math.random() * 1000).toString().padStart(3, "0");
      return `${ymd}-${rand}`;
    }
  </script>
</body>
</html>
