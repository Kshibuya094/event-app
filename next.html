<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>撮影と確認問題</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      text-align: center;
      padding: 2em;
      font-family: sans-serif;
      background: #f0f0f0;
    }
    button {
      margin: 1em;
      padding: 1em 2em;
      font-size: 1.1em;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #captureBtn, #saveBtn {
      background: #0078D4;
      color: white;
    }
    #nextBtn {
      background: #4CAF50;
      color: white;
      display: none;
    }
    #nextBtn:disabled {
      background: #a5d6a7;
      cursor: not-allowed;
    }
    video {
      width: 100%;
      max-width: 480px;
      background: #000;
      border-radius: 12px;
    }
    .serial {
      font-size: 1.5em;
      font-weight: bold;
      margin-top: 1em;
    }
    .notice, .warning {
      font-size: 0.95em;
      color: #d32f2f;
      margin-top: 0.5em;
      line-height: 1.6;
    }
    .question {
      margin-top: 2em;
      font-size: 1.1em;
    }
    .answer-btn {
      background: #ff9800;
      color: white;
    }
  </style>
</head>
<body>
  <div class="question">
    Q. イベントの入場には何が必要ですか？<br>
    <button class="answer-btn" onclick="checkAnswer(true)">顔写真の保存</button>
    <button class="answer-btn" onclick="checkAnswer(false)">名前の入力</button>
  </div>

  <video id="video" autoplay playsinline muted></video>
  <div class="notice">※顔がはっきり映るように撮影してください</div>
  <button id="captureBtn">撮影する</button>
  <button id="saveBtn" style="display:none;">画像を保存する</button>
  <div class="serial" id="serialNumber" style="display:none;">整理番号: #0001</div>

  <div class="warning" id="warningMessage" style="display:none;">
    ※画像を保存してください。<br>
    保存されていない場合、入場できません。<br>
    入場時に保存画像を確認します。
  </div>

  <button id="nextBtn" disabled>次へ進む</button>

  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const captureBtn = document.getElementById('captureBtn');
    const saveBtn = document.getElementById('saveBtn');
    const serialNumber = document.getElementById('serialNumber');
    const nextBtn = document.getElementById('nextBtn');
    const warningMessage = document.getElementById('warningMessage');

    let serialCount = 1;
    let imageSaved = false;
    let isAnsweredCorrectly = false;

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        setTimeout(() => {
          video.play().catch(err => {
            console.error('video.play() 失敗:', err);
          });
        }, 100);
      } catch (err) {
        alert('カメラの起動に失敗しました: ' + err.message);
      }
    }

    captureBtn.addEventListener('click', () => {
      const ctx = canvas.getContext('2d');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      saveBtn.style.display = 'inline-block';
      serialNumber.style.display = 'block';
      serialNumber.textContent = `整理番号: #${String(serialCount).padStart(4, '0')}`;
      serialCount++;
      warningMessage.style.display = 'block';
    });

    saveBtn.addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = 'photo.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      imageSaved = true;
      checkReady();
    });

    function checkAnswer(correct) {
      if (correct) {
        alert('正解です！');
        isAnsweredCorrectly = true;
        nextBtn.style.display = 'inline-block';
        checkReady();
      } else {
        alert('不正解です。もう一度選んでください。');
      }
    }

    function checkReady() {
      if (isAnsweredCorrectly) {
        nextBtn.style.display = 'inline-block';
        nextBtn.disabled = !imageSaved;
      }
    }

    nextBtn.addEventListener('click', () => {
      if (!imageSaved) {
        alert('画像を保存してから次へ進んでください');
        return;
      }
      window.location.href = 'confirm.html'; // 次のページへ（必要に応じて変更）
    });

    window.addEventListener('DOMContentLoaded', startCamera);
  </script>
</body>
</html>
