<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>画像撮影</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      text-align: center;
      padding: 2em;
      font-family: sans-serif;
    }
    video, canvas {
      width: 100%;
      max-width: 300px;
      border: 1px solid #ccc;
      margin-bottom: 1em;
      border-radius: 8px;
    }
    button {
      font-size: 1em;
      padding: 0.6em 1.2em;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin: 0.5em;
    }
    #captureBtn {
      background-color: #2196F3;
      color: white;
    }
    #saveBtn {
      background-color: #4CAF50;
      color: white;
      display: none;
    }
    #nextBtn {
      background-color: #FF9800;
      color: white;
      display: none;
      margin-top: 1em;
    }
    #warning {
      color: red;
      font-weight: bold;
      display: none;
      margin-top: 1em;
      line-height: 1.8;
      text-align: left;
      max-width: 300px;
      margin-left: auto;
      margin-right: auto;
      list-style-type: none;
      padding-left: 0;
    }
    #saveSection {
      display: none; /* Initially hidden */
      margin-top: 1em;
    }
    #saveSection label {
      font-size: 0.9em;
      color: #333;
    }
    #saveSection button {
      vertical-align: middle;
    }
    /* 画面フラッシュ用のCSS */
    #flash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: white;
      opacity: 0;
      display: none;
      z-index: 100;
    }
    @keyframes flash-animation {
      0% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 0; }
    }
    .flash-active {
      display: block;
      animation: flash-animation 0.2s ease-out;
    }
  </style>
</head>
<body>
  <h2>画像を撮影してください</h2>
  <video id="video" autoplay playsinline muted></video>
  <br>
  <button id="captureBtn" onclick="capture()">撮影する</button>
  <br>

    <div id="flash"></div>

  <ul id="warning">
    <li>＊「整理券を保存」を押して、画像をダウンロードしてください。</li>
    <li>＊保存した画像が整理券となります。</li>
    <li>＊ご入場の際に、保存された画像を確認いたします。</li>
  </ul>

  <div id="saveSection">
    <input type="checkbox" id="agreeCheckbox">
    <label for="agreeCheckbox">上記注意事項を確認しました</label>
    <br>
    <button id="saveBtn" onclick="saveImage()">整理券を保存</button>
  </div>
  
  <button id="nextBtn" onclick="goNext()">次へ進む</button>

  <canvas id="canvas" style="display:none;"></canvas>

  <script>

    const canvas = document.getElementById("canvas");
    const warning = document.getElementById("warning");
    const saveSection = document.getElementById("saveSection");
    const nextBtn = document.getElementById("nextBtn");
    const flashElement = document.getElementById("flash");

    let serialCount = 1;

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        await video.play();
      } catch (err) {
        alert("カメラにアクセスできません：" + err.message);
      }
    }

    function capture() {
      // 画面フラッシュアニメーションを実行
      flashElement.classList.add("flash-active");
      setTimeout(() => {
        flashElement.classList.remove("flash-active");
      }, 200); // アニメーション時間に合わせて調整

      const keyword = sessionStorage.getItem("keyword") || "（未取得）";

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
      ctx.fillRect(0, canvas.height - 80, canvas.width, 80);
      ctx.fillStyle = 'white';
      ctx.font = 'bold 24px sans-serif';
      ctx.fillText(`整理番号: #${serialCount}`, 20, canvas.height - 45);
      ctx.fillText(`答え: ${keyword}`, 20, canvas.height - 15);

      serialCount++;

      warning.style.display = "block";
      saveSection.style.display = "block";
    }
