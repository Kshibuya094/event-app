<body>
  <h2>📸 撮影ページ</h2>
  <video id="video" autoplay></video><br>
  <button onclick="takePhoto()">撮影する</button>
  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");

    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => video.srcObject = stream)
      .catch(err => alert("カメラが使えません"));

    function takePhoto() {
      const ctx = canvas.getContext("2d");
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);

      // 整理番号生成（連番）
      let serialNum = sessionStorage.getItem("serialNum");
      if (!serialNum) serialNum = 1;
      else serialNum = parseInt(serialNum) + 1;
      const serial = serialNum.toString().padStart(4, "0");

      // 整理番号を画像に描画
      ctx.font = "40px sans-serif";
      ctx.fillStyle = "blue";
      ctx.fillText(serial, 20, 50);

      // 保存
      const photoData = canvas.toDataURL("image/png");
      sessionStorage.setItem("photoData", photoData);
      sessionStorage.setItem("serial", serial);
      sessionStorage.setItem("serialNum", serialNum);

      // 自動遷移
      location.href = "ticket.html";
    }
  </script>
</body>
