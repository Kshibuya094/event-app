<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>撮影ページ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      text-align: center;
      padding: 2em;
      font-family: sans-serif;
      background: #f0f0f0;
    }
    #captureBtn, #saveBtn {
      margin: 1em;
      padding: 1em 2em;
      font-size: 1.1em;
      background: #0078D4;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    video {
      width: 100%;
      max-width: 480px;
      background: #000;
      border-radius: 12px;
    }
    .serial {
      font-size: 1.5em;
      font-weight: bold;
      margin-top: 1em;
    }
    .guide-btn {
      margin-top: 3em;
      padding: 1em 2em;
      font-size: 1em;
      background: #ff9800;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline muted></video>
  <button id="captureBtn">撮影する</button>
  <button id="saveBtn" style="display:none;">画像を保存する</button>
  <div class="serial" id="serialNumber" style="display:none;">整理番号: #0001</div>

  <button class="guide-btn" onclick="alert('Safariの場合：共有ボタン →「デスクトップ用Webサイトを表示」\nChromeの場合：メニュー →「PC版サイト」')">
    PC表示モードの切り替え方法を見る
  </button>

  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const captureBtn = document.getElementById('captureBtn');
    const saveBtn = document.getElementById('saveBtn');
    const serialNumber = document.getElementById('serialNumber');

    let serialCount = 1;

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        setTimeout(() => {
          video.play().catch(err => {
            console.error('video.play() 失敗:', err);
          });
        }, 100);
      } catch (err) {
        alert('カメラの起動に失敗しました: ' + err.message);
      }
    }

    captureBtn.addEventListener('click', () => {
      const ctx = canvas.getContext('2d');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      saveBtn.style.display = 'inline-block';
      serialNumber.style.display = 'block';
      serialNumber.textContent = `整理番号: #${String(serialCount).padStart(4, '0')}`;
      serialCount++;
    });

    saveBtn.addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = 'photo.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });

    window.addEventListener('DOMContentLoaded', startCamera);
  </script>
</body>
</html>
