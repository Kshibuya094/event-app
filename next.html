<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>撮影ページ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      text-align: center;
      padding: 2em;
      font-family: sans-serif;
      background: #f0f0f0;
    }
    #captureBtn, #saveBtn, #nextBtn {
      margin: 1em;
      padding: 1em 2em;
      font-size: 1.1em;
      background: #0078D4;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    video {
      width: 100%;
      max-width: 480px;
      background: #000;
      border-radius: 12px;
    }
    .serial {
      font-size: 1.5em;
      font-weight: bold;
      margin-top: 1em;
    }
    .notice {
      font-size: 0.95em;
      color: #d32f2f;
      margin-top: 0.5em;
    }
    #nextBtn {
      background: #4CAF50;
      display: none;
    }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline muted></video>
  <div class="notice">※顔がはっきり映るように撮影してください</div>
  <button id="captureBtn">撮影する</button>
  <button id="saveBtn" style="display:none;">画像を保存する</button>
  <div class="serial" id="serialNumber" style="display:none;">整理番号: #0001</div>
  <button id="nextBtn">次へ進む</button>

  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const captureBtn = document.getElementById('captureBtn');
    const saveBtn = document.getElementById('saveBtn');
    const serialNumber = document.getElementById('serialNumber');
    const nextBtn = document.getElementById('nextBtn');

    let serialCount = 1;
    let imageSaved = false;

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        setTimeout(() => {
          video.play().catch(err => {
            console.error('video.play() 失敗:', err);
          });
        }, 100);
      } catch (err) {
        alert('カメラの起動に失敗しました: ' + err.message);
      }
    }

    captureBtn.addEventListener('click', () => {
      const ctx = canvas.getContext('2d');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      saveBtn.style.display = 'inline-block';
      serialNumber.style.display = 'block';
      serialNumber.textContent = `整理番号: #${String(serialCount).padStart(4, '0')}`;
      serialCount++;
    });

    saveBtn.addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = 'photo.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      imageSaved = true;
      nextBtn.style.display = 'inline-block';
    });

    nextBtn.addEventListener('click', () => {
      if (!imageSaved) {
        alert('画像を保存してから次へ進んでください');
        return;
      }
      window.location.href = 'confirm.html'; // 次のページへ（必要に応じて変更）
    });

    window.addEventListener('DOMContentLoaded', startCamera);
  </script>
</body>
</html>
