<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>整理券作成 - 管理サイト</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <h1>🎫 整理券作成</h1>

  <form id="ticketForm">
    <label>タイトル：<input type="text" name="title" required></label><br>
    <label>公開日時：<input type="datetime-local" name="open" required></label><br>
    <label>終了日時：<input type="datetime-local" name="close" required></label><br>
    <label>発行枚数：<input type="number" name="limit" min="1" required></label><br>
    <label>端末制限（枚数）：<input type="number" name="perDevice" min="1" required></label><br>
    <label>券種：
      <select name="type">
        <option value="整理券">整理券</option>
        <option value="時間券">時間券</option>
      </select>
    </label><br>

    <fieldset>
      <legend>クイズ設定（任意）</legend>
      <label>問題文：<input type="text" name="question"></label><br>
      <label>正解（記述式）：<input type="text" name="answerText"></label><br>
    </fieldset>

    <button type="submit">保存する</button>
  </form>

  <script src="assets/js/create-ticket.js"></script>
</body>
</html>
