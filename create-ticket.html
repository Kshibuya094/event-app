<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>書き込み式クイズ</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .question { margin-bottom: 20px; }
    .result { margin-top: 10px; color: green; }
    .wrong { color: red; }
  </style>
</head>
<body>

  <h1>クイズに答えてください</h1>

  <div class="question" data-answer="富士山">
    <p>Q1. 日本で一番高い山は？</p>
    <input type="text" />
    <button onclick="checkAnswer(this)">答え合わせ</button>
    <div class="result"></div>
  </div>

  <div class="question" data-answer="100">
    <p>Q2. 水は摂氏何度で沸騰する？</p>
    <input type="text" />
    <button onclick="checkAnswer(this)">答え合わせ</button>
    <div class="result"></div>
  </div>

  <script>
    function checkAnswer(button) {
      const questionDiv = button.parentElement;
      const input = questionDiv.querySelector('input');
      const resultDiv = questionDiv.querySelector('.result');
      const correctAnswer = questionDiv.dataset.answer.trim();
      const userAnswer = input.value.trim();

      if (userAnswer === correctAnswer) {
        resultDiv.textContent = '正解！';
        resultDiv.className = 'result';
      } else {
        resultDiv.textContent = `不正解。正解は「${correctAnswer}」です。`;
        resultDiv.className = 'result wrong';
      }
    }
  </script>

</body>
</html>
