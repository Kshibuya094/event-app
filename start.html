<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>スタートページ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      text-align: center;
      padding: 2em;
      font-family: sans-serif;
    }
    button {
      font-size: 1em;
      padding: 0.6em 1.2em;
      margin-top: 1em;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background-color: #4CAF50;
      color: white;
    }
  </style>
</head>
<body>
  <h2>スタートページ</h2>
  <p>開始するには下のボタンを押してください。</p>
  <button onclick="start()">開始する</button>

  <script>
    function start() {
      // ✅ 1端末1アクセス制限
      if (localStorage.getItem("accessed")) {
        alert("この端末ではすでにアクセス済みです。");
        location.href = "error.html";
        return;
      }

      // ✅ 時間制限（23:50〜23:53のみ許可）
      const now = new Date();
      const hours = now.getHours();
      const minutes = now.getMinutes();
      const totalMinutes = hours * 60 + minutes;

      const startLimit = 23 * 60 + 50; // 23:50 → 1430分
      const endLimit = 23 * 60 + 53;   // 23:53 → 1433分

      if (totalMinutes < startLimit || totalMinutes > endLimit) {
        alert("現在はアクセスできません（23:50〜23:53限定）");
        location.href = "error.html";
        return;
      }

      // ✅ 記録して次へ
      localStorage.setItem("accessed", "true");
      location.href = "index.html";
    }
  </script>
</body>
</html>
