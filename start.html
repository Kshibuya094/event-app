<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>スタートページ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      text-align: center;
      padding: 2em;
      font-family: sans-serif;
    }
    button {
      font-size: 1em;
      padding: 0.6em 1.2em;
      margin-top: 2em;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background-color: #4CAF50;
      color: white;
    }
  </style>
</head>
<body>
  <h2>スタートページ</h2>
  <p>開始するには下のボタンを押してください。</p>
  <button onclick="start()">開始する</button>

  <script>
    // 1端末1アクセス制限
    if (localStorage.getItem("accessed")) {
      alert("この端末ではすでにアクセス済みです。");
      location.href = "error.html"; // エラーページに遷移（要作成）
    }

    function start() {
      localStorage.setItem("accessed", "true"); // 初回アクセス記録
      location.href = "index.html"; // クイズページへ遷移
    }
  </script>
</body>
</html>
