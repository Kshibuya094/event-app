<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>アークナイツPOP UP SHOP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      text-align: center;
      padding: 2em;
      font-family: sans-serif;
    }
    h2 {
      margin-bottom: 0.5em;
    }
    p {
      margin: 0.5em 0;
    }
    button {
      font-size: 1em;
      padding: 0.6em 1.2em;
      margin-top: 1em;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background-color: #4CAF50;
      color: white;
    }
    #note {
      margin-top: 1em;
      font-size: 0.9em;
      color: gray;
    }
  </style>
</head>
<body>
  <h2>アークナイツPOP UP SHOP</h2>
  <p>整理券取得可能日時：</p>
  <p><strong>2025年8月4日（日）14:20〜17:00</strong></p>
  <button onclick="start()">整理券取得を開始する</button>
  <p id="note">※1端末1回のみ取得可能です。</p>

  <script>
    function start() {
      // ✅ 公開時間制限（2025/8/4 14:20〜17:00）
      const now = new Date();
      const startTime = new Date("2025-08-04T14:20:00");
      const endTime   = new Date("2025-08-04T17:00:00");

      if (now < startTime || now > endTime) {
        alert("現在は整理券取得できません（2025/8/4 14:20〜17:00限定）");
        location.href = "error.html";
        return;
      }

      // ✅ 制限解除：localStorageによる1回制限はなし
      location.href = "index.html";
    }
  </script>
</body>
</html>
