<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>アークナイツPOP UP SHOP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      text-align: center;
      padding: 2em;
      font-family: sans-serif;
    }
    h2 {
      margin-bottom: 0.5em;
    }
    p {
      margin: 0.5em 0;
    }
    button {
      font-size: 1em;
      padding: 0.6em 1.2em;
      margin-top: 1em;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background-color: #4CAF50;
      color: white;
    }
    #note {
      margin-top: 1em;
      font-size: 0.9em;
      color: gray;
    }
  </style>
</head>
<body>
  <h2>アークナイツPOP UP SHOP</h2>
  <p>整理券取得可能日時：</p>
  <p><strong>2025年7月31日（木）0:01〜0:05</strong></p>
  <button onclick="start()">整理券取得を開始する</button>
  <p id="note">※1端末1回のみ取得可能です</p>

  <script>
    function start() {
      // ✅ 1端末1アクセス制限
      if (localStorage.getItem("accessed")) {
        alert("この端末ではすでに整理券を取得済みです。");
        location.href = "error.html";
        return;
      }

      // ✅ 秒まで含めた時間制限（2025/7/31 0:01:00〜0:05:59）
      const now = new Date();
      const startTime = new Date("2025-07-31T00:01:00");
      const endTime   = new Date("2025-07-31T00:05:59");

      if (now < startTime || now > endTime) {
        alert("現在は整理券取得できません（2025/7/31 0:01〜0:05限定）");
        location.href = "error.html";
        return;
      }

      // ✅ 記録して次へ
      localStorage.setItem("accessed", "true");
      location.href = "index.html";
    }
  </script>
</body>
</html>
