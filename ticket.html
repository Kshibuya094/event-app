<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>整理券表示</title>
  <style>
    img { max-width: 400px; margin-top: 10px; }
    .ticket { border: 1px solid #ccc; padding: 20px; width: fit-content; }
    .warning { color: red; font-weight: bold; }
    button:disabled { opacity: 0.5; }
  </style>
</head>
<body>
  <h2>🧾 整理券</h2>
  <div class="ticket">
    <p>整理番号：<span id="serial"></span></p>
    <img id="photo" alt="撮影画像"><br><br>
    <p class="warning" id="warnMsg">※画像の保存が必須です。保存ボタンを押してください。</p>
    <button id="saveBtn" onclick="downloadImage()">保存する</button>
  </div>

  <script>
    const serial = sessionStorage.getItem("serial") ?? "未取得";
    const imageData = sessionStorage.getItem("photoData");
    const saved = sessionStorage.getItem("saved") === "true";
    const externalUrl = "https://0101event.eventos.tokyo/web/portal/784/event/8393/module/ticket/311469?ticketLargeCategoryId=13357";

    document.getElementById("serial").textContent = serial;
    document.getElementById("photo").src = imageData ?? "";

    if (saved) {
      document.getElementById("warnMsg").textContent = "保存済みです。外部サイトへ進みます。";
      setTimeout(() => location.href = externalUrl, 1500);
    }

    function downloadImage() {
      const link = document.createElement("a");
      link.href = imageData;
      link.download = "ticket_" + serial + ".png";
      link.click();

      sessionStorage.setItem("saved", "true");
      document.getElementById("warnMsg").textContent = "保存完了！外部サイトへ進みます";
      setTimeout(() => location.href = externalUrl, 1500);
    }
  </script>
</body>
</html>
