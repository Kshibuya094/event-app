<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>入場済み一覧</title>
  <style>
    body { font-family: sans-serif; padding: 1em; text-align: center; }
    table {
      border-collapse: collapse;
      margin: 0 auto;
      table-layout: fixed;
      width: 720px; /* 全体幅を広げる */
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px 12px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    th:nth-child(1), td:nth-child(1) { width: 180px; }  /* 整理番号：広めに */
    th:nth-child(2), td:nth-child(2) { width: 360px; }  /* 日時：そのまま or やや広め */
    th:nth-child(3), td:nth-child(3) { width: 180px; }  /* 入場状況：広めに */
    th { background-color: #f0f0f0; }
  </style>
</head>
<body>
  <h2>✅ 入場済み一覧</h2>
  <table id="ticketTable">
    <thead>
      <tr>
        <th>番号</th>
        <th>日時</th>
        <th>状態</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    const tickets = JSON.parse(localStorage.getItem('tickets')) || {};
    const tbody = document.querySelector('#ticketTable tbody');

    Object.entries(tickets).forEach(([ticketId, ticket]) => {
      if (ticket.entered) {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${ticketId}</td>
          <td>${ticket.date}</td>
          <td>✅ 入場済み</td>
        `;
        tbody.appendChild(row);
      }
    });
  </script>
</body>
</html>
