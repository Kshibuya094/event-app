<script>
  // 有効時間設定（テスト用：今すぐ有効になる時間帯）
  const startTime = new Date("2025-07-30T21:50:00+09:00");
  const endTime   = new Date("2025-07-30T22:10:00+09:00");

  function isWithinAllowedTime() {
    const now = new Date();
    return now >= startTime && now <= endTime;
  }

  function startScan() {
    const messageEl = document.getElementById("message");
    messageEl.innerHTML = "";

    if (!isWithinAllowedTime()) {
      messageEl.innerHTML = "現在はQRコードの読み取り時間外です。<br>有効時間：2025年7月30日 21:50〜22:10";
      return;
    }

    // QR読み取り処理（または ticket.html へ遷移）
    window.location.href = "ticket.html";
  }
</script>
