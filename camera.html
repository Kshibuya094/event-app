<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>QRコード読み取り</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 2em;
    }
    #message {
      margin-top: 1em;
      color: red;
      font-weight: bold;
      white-space: pre-line;
    }
    button {
      font-size: 1.2em;
      padding: 1em 2em;
      margin-top: 2em;
    }
  </style>
</head>
<body>
  <h1>QRコード読み取り</h1>
  <p>QRコードを読み取ってイベントに進みます。</p>
  <button onclick="startScan()">読み取り開始</button>
  <div id="message"></div>

  <script>
    // 有効時間（日本時間で明示）
    const startTimeJST = new Date("2025-07-30T22:25:00+09:00").getTime();
    const endTimeJST   = new Date("2025-07-30T22:35:00+09:00").getTime();


    function isWithinAllowedTime() {
      const now = Date.now();
      return now >= startTimeJST && now <= endTimeJST;
    }

    function startScan() {
      const messageEl = document.getElementById("message");
      messageEl.innerHTML = "";

      if (!isWithinAllowedTime()) {
        messageEl.innerHTML = "現在はQRコードの読み取り時間外です。<br>有効時間：2025年8月1日 10:00〜10:10";
        return;
      }

      // 次の画面へ（next.html）
      window.location.href = "next.html";
    }
  </script>
</body>
</html>
