<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>スマホ対応カメラ</title>
  <style>
    body { text-align: center; padding: 2em; }
    video { width: 100%; max-width: 480px; background: #000; border-radius: 12px; }
    button { margin: 1em; padding: 1em; font-size: 1em; }
  </style>
</head>
<body>
  <h1>スマホ対応カメラ映像</h1>
  <video id="video" autoplay playsinline muted></video>
  <button id="captureBtn">撮影する</button>
  <canvas id="canvas" style="display:none;"></canvas>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const captureBtn = document.getElementById('captureBtn');

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        await video.play(); // 明示的に再生
      } catch (err) {
        console.error('カメラ取得失敗:', err);
        alert('カメラの起動に失敗しました: ' + err.message);
      }
    }

    captureBtn.addEventListener('click', () => {
      const ctx = canvas.getContext('2d');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      canvas.style.display = 'block';
    });

    startCamera();
  </script>
</body>
</html>
